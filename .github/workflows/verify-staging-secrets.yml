name: Verify Staging Secrets

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check MONGO_URI
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "::error::MONGO_URI is EMPTY"
            exit 1
          else
            echo "MONGO_URI is SET"
          fi

      - name: Check JWT_SECRET
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::JWT_SECRET is EMPTY"
            exit 1
          else
            echo "JWT_SECRET is SET"
          fi

      - name: Check other secrets (non-sensitive listing)
        env:
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          check() {
            name=$1; val="$2"
            if [ -z "$val" ]; then
              echo "::error::${name} is EMPTY"
              exit 1
            else
              echo "${name} is SET"
            fi
          }
          check REFRESH_TOKEN_SECRET "$REFRESH_TOKEN_SECRET"
          check JINA_API_KEY "$JINA_API_KEY"
          check QDRANT_URL "$QDRANT_URL"
          check QDRANT_API_KEY "$QDRANT_API_KEY"
          check LLM_API_URL "$LLM_API_URL"
          check SMTP_HOST "$SMTP_HOST"
          check SMTP_PORT "$SMTP_PORT"
          check SMTP_SECURE "$SMTP_SECURE"
          check SMTP_USER "$SMTP_USER"
          check SMTP_PASS "$SMTP_PASS"