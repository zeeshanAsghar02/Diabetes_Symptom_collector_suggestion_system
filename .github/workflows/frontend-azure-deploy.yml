name: Frontend Azure Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-azure-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target Azure environment
        type: choice
        required: true
        default: staging
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: frontend-azure-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Install Rollup native binary
        working-directory: frontend
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.44.2

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Install Rollup native binary
        working-directory: frontend
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.44.2

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check build output
        run: |
          echo "Checking dist folder structure..."
          find frontend/dist -type f | head -20
          echo "Secret availability check..."
          [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" ] && echo "ERROR: AZURE_STATIC_WEB_APPS_API_TOKEN is not set" || echo "OK: AZURE_STATIC_WEB_APPS_API_TOKEN is set"
          [ -z "${{ secrets.GITHUB_TOKEN }}" ] && echo "ERROR: GITHUB_TOKEN is not set" || echo "OK: GITHUB_TOKEN is set"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ''
          skip_app_build: true
